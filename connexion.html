<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — DÉKOD-IA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

<div class="auth-page page-enter">
  <div class="auth-logo"><img src="assets/images/Logo.png" alt="DÉKOD-IA" class="logo-img"></div>
  <div class="auth-card skeleton" id="auth-card"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<!-- Lucide chargé AVANT le script inline -->
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>
  (async () => {
    await redirectIfLoggedIn();

    const card = document.getElementById('auth-card');
    card.classList.remove('skeleton');
    card.innerHTML = `
      <h1>Bon retour.</h1>
      <p class="auth-subtitle">Connecte-toi pour accéder à ton guide.</p>
      <form id="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <div class="input-wrap">
            <input type="email" id="email" placeholder="ton@email.com" required autocomplete="email">
          </div>
        </div>
        <div class="form-group">
          <label for="password">Mot de passe</label>
          <div class="input-wrap">
            <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            <button type="button" class="input-eye" id="toggle-pwd" aria-label="Afficher le mot de passe">
              <i data-lucide="eye"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="auth-submit" id="submit-btn">Se connecter</button>
      </form>
      <p class="auth-link">Pas encore de compte ? <a href="inscription.html">Accéder au guide</a></p>
    `;
    lucide.createIcons();

    // Toggle afficher / masquer mot de passe
    document.getElementById('toggle-pwd').addEventListener('click', function () {
      const input  = document.getElementById('password');
      const hidden = input.type === 'password';
      input.type   = hidden ? 'text' : 'password';
      this.querySelector('svg')?.remove();
      this.innerHTML = hidden ? '<i data-lucide="eye-off"></i>' : '<i data-lucide="eye"></i>';
      lucide.createIcons();
    });

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      btn.disabled    = true;
      btn.textContent = 'Connexion…';
      try {
        const data = await signIn(
          document.getElementById('email').value.trim(),
          document.getElementById('password').value
        );
        const dest = await getRoleRedirect(data.user.id);
        window.location.href = dest;
      } catch (err) {
        if (err.code === 'SUSPENDED') {
          toast('Compte suspendu. Contacte le support.', 'error');
        } else {
          toast(err.message || 'Erreur de connexion.', 'error');
        }
        btn.disabled    = false;
        btn.textContent = 'Se connecter';
      }
    });
  })();
</script>
</body>
</html>
