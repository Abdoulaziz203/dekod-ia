[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[build.processing]
  skip_processing = false
[build.processing.html]
  pretty_urls = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/inscription.html"
  to = "/inscription"
  status = 301

[[redirects]]
  from = "/connexion.html"
  to = "/connexion"
  status = 301

[[redirects]]
  from = "/dashboard.html"
  to = "/dashboard"
  status = 301

[[redirects]]
  from = "/lire.html"
  to = "/lire"
  status = 301

[[redirects]]
  from = "/admin.html"
  to = "/admin"
  status = 301

[[redirects]]
  from = "/partenaire-inscription.html"
  to = "/partenaire-inscription"
  status = 301

[[redirects]]
  from = "/partenaire-dashboard.html"
  to = "/partenaire-dashboard"
  status = 301
