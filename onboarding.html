<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bienvenue — DÉKOD-IA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

    /* ── HEADER ── */
    .ob-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 32px;
      flex-shrink: 0;
    }
    .ob-logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 22px;
      color: var(--color-white);
    }
    .ob-logo span { color: var(--color-red); }

    .ob-prog-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .ob-prog-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--color-text-muted);
      white-space: nowrap;
    }
    .ob-prog-track {
      width: 120px;
      height: 4px;
      background: var(--color-border);
      border-radius: 99px;
      overflow: hidden;
    }
    .ob-prog-fill {
      height: 100%;
      background: var(--color-red);
      border-radius: 99px;
      transition: width 0.4s ease-out;
    }

    /* ── SCREEN QUESTION ── */
    #screen-question {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .ob-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px 24px;
      overflow-y: auto;
    }

    .ob-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 14px;
      padding: 36px 40px;
      max-width: 640px;
      width: 100%;
      animation: cardIn 0.35s ease-out forwards;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .ob-q-num {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--color-red);
      margin-bottom: 10px;
    }
    .ob-q-titre {
      font-size: clamp(20px, 4vw, 28px);
      font-weight: 700;
      color: var(--color-white);
      margin-bottom: 6px;
      line-height: 1.2;
    }
    .ob-q-sub {
      font-size: 14px;
      color: var(--color-text-muted);
      margin-bottom: 24px;
    }

    .ob-options {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
    }
    .ob-option {
      padding: 12px 16px;
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      color: var(--color-text-soft);
      text-align: left;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
    }
    .ob-option:hover { border-color: rgba(232,0,29,0.4); color: var(--color-white); }
    .ob-option.selected {
      border-color: var(--color-red);
      background: rgba(232,0,29,0.08);
      color: var(--color-white);
    }

    /* ── FOOTER BOUTONS ── */
    .ob-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 32px 28px;
      flex-shrink: 0;
      border-top: 1px solid var(--color-border);
    }
    .btn-ignorer {
      font-size: 14px;
      color: var(--color-text-muted);
      padding: 10px 20px;
      border-radius: 6px;
      border: 1px solid var(--color-border);
      background: transparent;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .btn-ignorer:hover { color: var(--color-white); border-color: var(--color-text-muted); }

    .btn-suivant {
      font-size: 15px;
      font-weight: 600;
      color: var(--color-white);
      padding: 11px 28px;
      border-radius: 6px;
      background: var(--color-red);
      cursor: pointer;
      transition: opacity 0.15s, transform 0.15s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btn-suivant:hover { opacity: 0.88; transform: translateY(-1px); }

    /* ── CÉLÉBRATION ── */
    #screen-celeb {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--color-bg);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      z-index: 999;
      overflow: hidden;
    }

    #confetti-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .confetti-piece {
      position: absolute;
      top: -12px;
      opacity: 0.9;
      animation: confettiFall linear forwards;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      80%  { opacity: 0.8; }
      100% { transform: translateY(110vh) rotate(540deg); opacity: 0; }
    }

    .celeb-inner {
      position: relative;
      z-index: 2;
      animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.7); }
      to   { opacity: 1; transform: scale(1); }
    }
    .celeb-emoji {
      font-size: 72px;
      line-height: 1;
      margin-bottom: 24px;
      display: block;
      animation: bounce 0.6s ease-out 0.3s both;
    }
    @keyframes bounce {
      0%   { transform: scale(0); }
      60%  { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
    .celeb-titre {
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 700;
      color: var(--color-white);
      margin-bottom: 14px;
    }
    .celeb-titre span { color: var(--color-red); }
    .celeb-sub {
      font-size: 16px;
      color: var(--color-text-muted);
      margin-bottom: 36px;
      line-height: 1.6;
    }
    .btn-entrer {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 36px;
      background: var(--color-red);
      color: var(--color-white);
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      transition: filter 0.15s, transform 0.15s;
      animation: fadeUp 0.4s ease-out 0.8s both;
    }
    .btn-entrer:hover { filter: brightness(1.1); transform: translateY(-2px); }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      .ob-header { padding: 16px 20px; }
      .ob-footer  { padding: 16px 20px 20px; }
      .ob-card    { padding: 24px 20px; border-radius: 10px; }
      .ob-prog-track { width: 80px; }
      .ob-options { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 380px) {
      .ob-options { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- SCREEN QUESTIONS -->
<div id="screen-question">

  <header class="ob-header">
    <div class="ob-logo">DÉKOD<span>-IA</span></div>
    <div class="ob-prog-wrap">
      <span class="ob-prog-label" id="ob-prog-label">1 sur 3</span>
      <div class="ob-prog-track">
        <div class="ob-prog-fill" id="ob-prog-fill" style="width:33%"></div>
      </div>
    </div>
  </header>

  <div class="ob-main" id="ob-main"></div>

  <footer class="ob-footer">
    <button class="btn-ignorer" id="btn-ignorer">Ignorer cette question</button>
    <button class="btn-suivant" id="btn-suivant">Suivant →</button>
  </footer>

</div>

<!-- SCREEN CÉLÉBRATION -->
<div id="screen-celeb">
  <div id="confetti-container"></div>
  <div class="celeb-inner">
    <span class="celeb-emoji">🎉</span>
    <h1 class="celeb-titre">Bienvenue dans<br><span>DÉKOD-IA</span> !</h1>
    <p class="celeb-sub">Ton guide t'attend.<br>Bonne lecture et bon lancement.</p>
    <a href="dashboard.html" class="btn-entrer">Accéder au guide →</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script>
(async () => {

  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'connexion.html'; return; }

  // Déjà fait → dashboard direct
  const { data: profile } = await sb
    .from('profiles').select('onboarding_done').eq('id', session.user.id).single();
  if (profile?.onboarding_done) { window.location.href = 'dashboard.html'; return; }

  // ── Définition des questions ─────────────────────────────────────────────────
  const QUESTIONS = [
    {
      id: 'decouverte',
      label: 'Comment as-tu découvert DÉKOD-IA ?',
      sub: 'Ça nous aide à mieux te rejoindre.',
      options: ['YouTube', 'TikTok', 'Instagram', 'Twitter / X', 'Bouche à oreille', 'Google / Recherche', 'Autre']
    },
    {
      id: 'objectif',
      label: 'Quel est ton objectif principal ?',
      sub: 'On veut t\'aider à l\'atteindre.',
      options: ['Lancer un SaaS', 'Apprendre le vibe-coding', 'Trouver un emploi tech', 'Générer des revenus en ligne', 'Progresser en développement', 'Autre']
    },
    {
      id: 'niveau',
      label: 'Quel est ton niveau en développement ?',
      sub: 'Pas de jugement — on part d\'où tu en es.',
      options: ['Zéro code (débutant complet)', 'Quelques bases (HTML/CSS)', 'Dev junior', 'Dev expérimenté']
    }
  ];

  let step = 0;
  let selected = null;
  const answers = {};

  // ── Render question ──────────────────────────────────────────────────────────
  function renderStep(i) {
    selected = null;
    const q = QUESTIONS[i];
    const total = QUESTIONS.length;
    const isLast = i === total - 1;

    document.getElementById('ob-prog-label').textContent = `${i + 1} sur ${total}`;
    document.getElementById('ob-prog-fill').style.width = `${((i + 1) / total) * 100}%`;
    document.getElementById('btn-suivant').textContent = isLast ? 'Terminer ✓' : 'Suivant →';

    document.getElementById('ob-main').innerHTML = `
      <div class="ob-card">
        <p class="ob-q-num">Question ${i + 1} sur ${total}</p>
        <h2 class="ob-q-titre">${q.label}</h2>
        <p class="ob-q-sub">${q.sub}</p>
        <div class="ob-options">
          ${q.options.map(opt => `
            <button class="ob-option" onclick="pickOption(this, '${opt.replace(/'/g, "\\'")}')">
              ${opt}
            </button>
          `).join('')}
        </div>
      </div>`;
  }

  window.pickOption = function(btn, value) {
    document.querySelectorAll('.ob-option').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selected = value;
  };

  // ── Avancer ─────────────────────────────────────────────────────────────────
  async function advance(save) {
    if (save && selected) {
      answers[QUESTIONS[step].id] = { label: QUESTIONS[step].label, value: selected };
    }
    step++;
    if (step < QUESTIONS.length) {
      renderStep(step);
    } else {
      await finish();
    }
  }

  // ── Finaliser ────────────────────────────────────────────────────────────────
  async function finish() {
    // Sauvegarder les réponses
    const inserts = Object.entries(answers).map(([qId, a]) => ({
      user_id: session.user.id,
      question_id: qId,
      question_label: a.label,
      reponse: a.value
    }));
    if (inserts.length > 0) {
      await sb.from('onboarding_reponses').upsert(inserts, { onConflict: 'user_id,question_id' });
    }
    // Marquer onboarding terminé
    await sb.from('profiles').update({ onboarding_done: true }).eq('id', session.user.id);
    // Lancer la célébration
    showCeleb();
  }

  // ── Célébration ──────────────────────────────────────────────────────────────
  function showCeleb() {
    document.getElementById('screen-question').style.display = 'none';
    const celeb = document.getElementById('screen-celeb');
    celeb.style.display = 'flex';
    launchConfetti();
  }

  function launchConfetti() {
    const colors = ['#E8001D', '#FFFFFF', '#f59e0b', '#22c55e', '#3b82f6', '#a855f7'];
    const container = document.getElementById('confetti-container');
    const shapes = ['50%', '2px', '50%'];

    for (let i = 0; i < 120; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      const size = 5 + Math.random() * 9;
      el.style.cssText = [
        `left:${Math.random() * 100}%`,
        `background:${colors[Math.floor(Math.random() * colors.length)]}`,
        `animation-delay:${Math.random() * 1.2}s`,
        `animation-duration:${1.2 + Math.random() * 1.2}s`,
        `width:${size}px`,
        `height:${size}px`,
        `border-radius:${shapes[Math.floor(Math.random() * shapes.length)]}`
      ].join(';');
      container.appendChild(el);
    }
  }

  // ── Listeners ────────────────────────────────────────────────────────────────
  document.getElementById('btn-suivant').addEventListener('click', () => advance(true));
  document.getElementById('btn-ignorer').addEventListener('click', () => advance(false));

  // Init
  renderStep(0);
})();
</script>
</body>
</html>
