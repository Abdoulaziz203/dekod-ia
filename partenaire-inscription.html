<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Devenir Partenaire — DÉKOD-IA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

<div class="auth-page page-enter">
  <div class="auth-logo">DÉKOD<span>-IA</span></div>
  <div class="auth-card" id="auth-card">

    <span style="display:inline-block;background:rgba(232,0,29,0.12);color:var(--color-red);font-size:12px;font-weight:700;padding:4px 10px;border-radius:20px;margin-bottom:16px;letter-spacing:0.5px;">
      Programme Partenaire · 20% de commission
    </span>

    <h1>Rejoins le programme.</h1>
    <p class="auth-subtitle">Partage le guide, gagne une commission sur chaque vente générée.</p>

    <form id="part-form">
      <div class="form-group">
        <label for="nom">Nom complet</label>
        <input type="text" id="nom" placeholder="Ton nom et prénom" required autocomplete="name">
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="ton@email.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" placeholder="8 caractères min." required autocomplete="new-password" minlength="8">
      </div>
      <div class="form-group">
        <label for="telephone">Numéro de téléphone</label>
        <input type="tel" id="telephone" placeholder="+221 77 000 00 00" required autocomplete="tel">
      </div>
      <div class="form-group">
        <label for="pays">Pays</label>
        <input type="text" id="pays" placeholder="Ex : Sénégal, Côte d'Ivoire…" required>
      </div>
      <button type="submit" class="auth-submit" id="submit-btn">Devenir partenaire</button>
    </form>

    <p class="auth-link">Déjà partenaire ? <a href="connexion.html">Se connecter</a></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script>
  (async () => {
    await redirectIfLoggedIn();

    document.getElementById('part-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn       = document.getElementById('submit-btn');
      const nom       = document.getElementById('nom').value.trim();
      const email     = document.getElementById('email').value.trim();
      const password  = document.getElementById('password').value;
      const telephone = document.getElementById('telephone').value.trim();
      const pays      = document.getElementById('pays').value.trim();

      btn.disabled = true;
      btn.textContent = 'Envoi en cours…';

      try {
        const res = await fetch('/api/inscrire-partenaire', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nom, email, password, telephone, pays })
        });
        const data = await res.json();

        if (!res.ok) {
          toast(data.error || 'Erreur lors de la soumission.', 'error');
          btn.disabled = false;
          btn.textContent = 'Devenir partenaire';
          return;
        }

        // Remplacer le formulaire par le message de confirmation
        document.getElementById('auth-card').innerHTML = `
          <div style="text-align:center;padding:16px 0;">
            <div style="width:56px;height:56px;border-radius:50%;background:rgba(34,197,94,0.12);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;">
              <i data-lucide="clock" style="width:26px;height:26px;color:#22c55e;"></i>
            </div>
            <h1 style="font-size:24px;margin-bottom:12px;">Demande envoyée !</h1>
            <p style="color:var(--color-text-muted);font-size:14px;line-height:1.7;">
              Votre demande est en cours de validation.<br>
              Revenez plus tard ou attendez notre confirmation.<br><br>
              Vous pouvez dès maintenant vous connecter avec vos identifiants.<br>
              Votre tableau de bord sera actif une fois votre compte validé.
            </p>
            <a href="connexion.html" style="display:inline-block;margin-top:24px;padding:12px 24px;background:var(--color-red);color:var(--color-white);border-radius:6px;font-size:15px;font-weight:600;">
              Se connecter
            </a>
          </div>
        `;
        lucide.createIcons();

      } catch {
        toast('Erreur réseau. Vérifie ta connexion.', 'error');
        btn.disabled = false;
        btn.textContent = 'Devenir partenaire';
      }
    });
  })();
</script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
