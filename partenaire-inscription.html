<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Devenir Partenaire — DÉKOD-IA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

<div class="auth-page page-enter">
  <div class="auth-logo"><img src="assets/images/Logo.png" alt="DÉKOD-IA" class="logo-img"></div>

  <div class="auth-card wide" id="auth-card">

    <span style="display:inline-block;background:rgba(232,0,29,0.12);color:var(--color-red);font-size:12px;font-weight:700;padding:4px 10px;border-radius:20px;margin-bottom:16px;letter-spacing:0.5px;">
      Programme Partenaire · 35% de commission
    </span>

    <h1>Rejoins le programme.</h1>
    <p class="auth-subtitle">Partage le guide, gagne une commission sur chaque vente générée.</p>

    <form id="part-form">
      <div class="form-row">
        <div class="form-group">
          <label for="nom">Nom complet</label>
          <div class="input-wrap">
            <input type="text" id="nom" placeholder="Ton nom et prénom" required autocomplete="name">
          </div>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <div class="input-wrap">
            <input type="email" id="email" placeholder="ton@email.com" required autocomplete="email">
          </div>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="telephone">Téléphone</label>
          <div class="input-wrap">
            <input type="tel" id="telephone" placeholder="+221 77 000 00 00" required autocomplete="tel">
          </div>
        </div>
        <div class="form-group">
          <label for="pays">Pays</label>
          <div class="input-wrap">
            <input type="text" id="pays" placeholder="Ex : Sénégal, Côte d'Ivoire…" required>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <div class="input-wrap">
          <input type="password" id="password" placeholder="8 caractères minimum" required autocomplete="new-password">
          <button type="button" class="input-eye" id="toggle-pwd" aria-label="Afficher le mot de passe">
            <i data-lucide="eye"></i>
          </button>
        </div>
        <div class="pwd-strength">
          <div class="pwd-strength-bar">
            <div class="pwd-strength-fill" id="pwd-fill"></div>
          </div>
          <span class="pwd-strength-label" id="pwd-label"></span>
        </div>
        <ul class="pwd-criteria">
          <li class="pwd-crit" id="crit-len"   data-label="8 caractères minimum"><i data-lucide="circle"></i> 8 caractères minimum</li>
          <li class="pwd-crit" id="crit-upper" data-label="Une lettre majuscule"><i data-lucide="circle"></i> Une lettre majuscule</li>
          <li class="pwd-crit" id="crit-num"   data-label="Un chiffre"><i data-lucide="circle"></i> Un chiffre</li>
        </ul>
      </div>

      <div class="form-group">
        <label for="password-confirm">Confirmer le mot de passe</label>
        <div class="input-wrap">
          <input type="password" id="password-confirm" placeholder="Répète ton mot de passe" required autocomplete="new-password">
          <button type="button" class="input-eye" id="toggle-confirm" aria-label="Afficher la confirmation">
            <i data-lucide="eye"></i>
          </button>
        </div>
        <div class="pwd-match-hint" id="pwd-match-hint"></div>
      </div>

      <button type="submit" class="auth-submit" id="submit-btn">Devenir partenaire</button>
    </form>

    <p class="auth-link">Déjà partenaire ? <a href="connexion">Se connecter</a></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<!-- Lucide chargé AVANT le script inline -->
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>
  lucide.createIcons();

  // ── Toggle afficher / masquer ───────────────────────────────────────────
  function makeToggle(btnId, inputId) {
    document.getElementById(btnId).addEventListener('click', function () {
      const input  = document.getElementById(inputId);
      const hidden = input.type === 'password';
      input.type   = hidden ? 'text' : 'password';
      this.innerHTML = hidden ? '<i data-lucide="eye-off"></i>' : '<i data-lucide="eye"></i>';
      lucide.createIcons();
    });
  }
  makeToggle('toggle-pwd',     'password');
  makeToggle('toggle-confirm', 'password-confirm');

  // ── Critère visuel ─────────────────────────────────────────────────────
  function setCrit(el, ok) {
    const label = el.dataset.label;
    el.classList.toggle('ok', ok);
    el.innerHTML = (ok ? '<i data-lucide="check-circle"></i> ' : '<i data-lucide="circle"></i> ') + label;
  }

  // ── Barre de force + critères ───────────────────────────────────────────
  document.getElementById('password').addEventListener('input', function () {
    const val = this.value;
    const fill  = document.getElementById('pwd-fill');
    const label = document.getElementById('pwd-label');

    const okLen   = val.length >= 8;
    const okUpper = /[A-Z]/.test(val);
    const okNum   = /[0-9]/.test(val);

    setCrit(document.getElementById('crit-len'),   okLen);
    setCrit(document.getElementById('crit-upper'), okUpper);
    setCrit(document.getElementById('crit-num'),   okNum);
    lucide.createIcons();

    const score = [okLen, okUpper, okNum, val.length >= 12, /[^a-zA-Z0-9]/.test(val)]
      .filter(Boolean).length;

    if (val.length === 0) {
      fill.style.width  = '0%';
      fill.className    = 'pwd-strength-fill';
      label.textContent = '';
      label.className   = 'pwd-strength-label';
    } else if (score <= 2) {
      fill.style.width  = '33%';
      fill.className    = 'pwd-strength-fill weak';
      label.textContent = 'Faible';
      label.className   = 'pwd-strength-label weak';
    } else if (score <= 3) {
      fill.style.width  = '66%';
      fill.className    = 'pwd-strength-fill medium';
      label.textContent = 'Moyen';
      label.className   = 'pwd-strength-label medium';
    } else {
      fill.style.width  = '100%';
      fill.className    = 'pwd-strength-fill strong';
      label.textContent = 'Fort';
      label.className   = 'pwd-strength-label strong';
    }

    checkMatch();
  });

  // ── Correspondance ──────────────────────────────────────────────────────
  function checkMatch() {
    const pwd     = document.getElementById('password').value;
    const confirm = document.getElementById('password-confirm').value;
    const hint    = document.getElementById('pwd-match-hint');
    if (confirm.length === 0) {
      hint.innerHTML = '';
      hint.className = 'pwd-match-hint';
      return;
    }
    if (pwd === confirm) {
      hint.innerHTML = '<i data-lucide="check-circle"></i> Les mots de passe correspondent';
      hint.className = 'pwd-match-hint ok';
    } else {
      hint.innerHTML = '<i data-lucide="x-circle"></i> Les mots de passe ne correspondent pas';
      hint.className = 'pwd-match-hint err';
    }
    lucide.createIcons();
  }
  document.getElementById('password-confirm').addEventListener('input', checkMatch);

  // ── Soumission ──────────────────────────────────────────────────────────
  (async () => {
    await redirectIfLoggedIn();

    document.getElementById('part-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn       = document.getElementById('submit-btn');
      const nom       = document.getElementById('nom').value.trim();
      const email     = document.getElementById('email').value.trim();
      const password  = document.getElementById('password').value;
      const confirm   = document.getElementById('password-confirm').value;
      const telephone = document.getElementById('telephone').value.trim();
      const pays      = document.getElementById('pays').value.trim();

      if (password.length < 8) {
        toast('Le mot de passe doit faire au moins 8 caractères.', 'error');
        document.getElementById('password').focus();
        return;
      }
      if (password !== confirm) {
        toast('Les mots de passe ne correspondent pas.', 'error');
        document.getElementById('password-confirm').focus();
        return;
      }

      btn.disabled    = true;
      btn.textContent = 'Envoi en cours…';

      try {
        const { data, error } = await sb.functions.invoke('inscrire-partenaire', {
          body: { nom, email, password, telephone, pays }
        });

        if (error) {
          let msg = 'Erreur lors de la soumission.';
          try { const ctx = await error.context?.json?.(); if (ctx?.error) msg = ctx.error; } catch {}
          toast(msg, 'error');
          btn.disabled    = false;
          btn.textContent = 'Devenir partenaire';
          return;
        }
        if (!data?.ok) {
          toast(data?.error || 'Erreur lors de la soumission.', 'error');
          btn.disabled    = false;
          btn.textContent = 'Devenir partenaire';
          return;
        }

        document.getElementById('auth-card').innerHTML = `
          <div style="text-align:center;padding:24px 0;">
            <div style="width:60px;height:60px;border-radius:50%;background:rgba(34,197,94,0.12);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;">
              <i data-lucide="clock" style="width:28px;height:28px;color:#22c55e;"></i>
            </div>
            <h1 style="font-size:26px;margin-bottom:12px;">Demande envoyée !</h1>
            <p style="color:var(--color-text-muted);font-size:14px;line-height:1.7;">
              Ta candidature est en cours de validation.<br>
              Tu seras notifié par email dès que ton compte est activé.<br><br>
              Tu peux te connecter dès maintenant — ton dashboard<br>
              sera disponible une fois ton compte validé.
            </p>
            <a href="connexion" style="display:inline-block;margin-top:28px;padding:13px 32px;background:var(--color-red);color:var(--color-white);border-radius:6px;font-size:15px;font-weight:600;">
              Se connecter
            </a>
          </div>
        `;
        lucide.createIcons();

      } catch {
        toast('Erreur réseau. Vérifie ta connexion.', 'error');
        btn.disabled    = false;
        btn.textContent = 'Devenir partenaire';
      }
    });
  })();
</script>
</body>
</html>
